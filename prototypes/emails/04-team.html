<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echipă · Email-uri</title>
  <script>
    (function () {
      var t = localStorage.getItem('proto-theme');
      if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <link rel="stylesheet" href="../../assets/application.css">
  <link rel="stylesheet" href="email.css">
</head>
<body class="bg-surface-50 text-ink-800 font-sans antialiased min-h-screen">

  <div class="rounded-xl border border-amber-200 dark:border-amber-500/20 bg-amber-50/60 dark:bg-amber-500/5 px-4 py-2.5 m-4 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span>
      <span class="text-[11px] font-semibold text-amber-700 dark:text-amber-300">Email-uri · 04 — Echipă</span>
    </div>
    <a href="index.html" class="text-[11px] font-medium text-amber-700 dark:text-amber-300 hover:underline">← înapoi la set</a>
  </div>

  <div class="max-w-2xl mx-auto px-4 py-6 md:px-6 md:py-8">
    <div class="card p-6 mb-10">
      <div class="text-xl font-bold text-ink-900">Echipă — invitații & acces</div>
      <div class="text-sm text-ink-500 mt-1.5 leading-relaxed">
        Invitație, confirmare, anunț de membru nou și schimbări de rol/acces. Toate în numele workspace-ului.
      </div>
    </div>
    <div id="emails" class="space-y-12"></div>
  </div>

  <button type="button" class="btn fixed bottom-4 right-4 shadow-lg z-50"
    onclick="(function(){var d=document.documentElement;var on=d.getAttribute('data-theme')==='dark';d.setAttribute('data-theme',on?'':'dark');localStorage.setItem('proto-theme',on?'light':'dark');})()">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>

  <script src="email.js"></script>
  <script>
    var B = Email.B;
    var ws = { type: 'ws', initial: '4', color: '#2563eb', name: '4MMP', slug: '4mmp' };

    Email.renderAll('#emails', [
      {
        meta: { mailer: 'Team::InvitationsMailer#invite_user', from: '4MMP <noreply@eventya.net>', ctx: 'ws' },
        header: ws, category: 'Invitație', ref: 'TEAM-001',
        body: B.h1('Echipa 4MMP te vrea alături')
            + B.p('Ai fost invitat să lucrezi în workspace-ul ' + B.strong('4MMP') + '. Intri cu un singur clic.')
            + B.btn('Acceptă invitația →')
            + B.small('Dacă nu te așteptai la invitația asta, ignoră liniștit mesajul.')
      },
      {
        meta: { mailer: 'Team::InvitationsMailer#invitation_confirmed', from: '4MMP <noreply@eventya.net>', ctx: 'ws' },
        header: ws, category: 'Echipă', ref: 'TEAM-002',
        body: B.h1('Ești în echipă!')
            + B.p('Gata, te-ai alăturat workspace-ului ' + B.strong('4MMP') + '. De acum poți lucra cot la cot cu colegii.')
            + B.panel([['Workspace', '4MMP'], ['Rolul tău', 'Editor']])
      },
      {
        meta: { mailer: 'Team::InvitationsMailer#member_joined', from: '4MMP <noreply@eventya.net>', ctx: 'ws' },
        header: ws, category: 'Echipă', ref: 'TEAM-003',
        body: B.h1('Maria ți-a acceptat invitația')
            + B.p('Veste bună! ' + B.strong('Maria Popescu') + ' s-a alăturat echipei ' + B.strong('4MMP') + ' și poate începe să lucreze.')
            + B.btn('Vezi echipa →')
      },
      {
        meta: { mailer: 'Team::InvitationsMailer#membership_changed', subject: 'rol acordat', from: '4MMP <noreply@eventya.net>', ctx: 'ws' },
        header: ws, category: 'Echipă', ref: 'TEAM-004',
        body: B.h1('Acum gestionezi pagini')
            + B.p('Poți edita paginile de mai jos — și subpaginile lor — în ' + B.strong('4MMP') + '.')
            + B.callout('ok', B.strong('Pagini pe care le gestionezi: ') + 'Despre noi · Servicii · Contact')
            + B.btn('Deschide CMS →')
      }
    ]);
  </script>
</body>
</html>
