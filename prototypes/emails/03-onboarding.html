<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding · Email-uri</title>
  <script>
    (function () {
      var t = localStorage.getItem('proto-theme');
      if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <link rel="stylesheet" href="../../assets/application.css">
  <link rel="stylesheet" href="email.css">
</head>
<body class="bg-surface-50 text-ink-800 font-sans antialiased min-h-screen">

  <div class="rounded-xl border border-amber-200 dark:border-amber-500/20 bg-amber-50/60 dark:bg-amber-500/5 px-4 py-2.5 m-4 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span>
      <span class="text-[11px] font-semibold text-amber-700 dark:text-amber-300">Email-uri · 03 — Onboarding</span>
    </div>
    <a href="index.html" class="text-[11px] font-medium text-amber-700 dark:text-amber-300 hover:underline">← înapoi la set</a>
  </div>

  <div class="max-w-2xl mx-auto px-4 py-6 md:px-6 md:py-8">
    <div class="card p-6 mb-10">
      <div class="text-xl font-bold text-ink-900">Onboarding — bun venit</div>
      <div class="text-sm text-ink-500 mt-1.5 leading-relaxed">
        Primul contact cu produsul. Ton cald, pași clari, un singur CTA. Workspace nou (client), editor adăugat, membru înscris — plus varianta de platformă.
      </div>
    </div>
    <div id="emails" class="space-y-12"></div>
  </div>

  <button type="button" class="btn fixed bottom-4 right-4 shadow-lg z-50"
    onclick="(function(){var d=document.documentElement;var on=d.getAttribute('data-theme')==='dark';d.setAttribute('data-theme',on?'':'dark');localStorage.setItem('proto-theme',on?'light':'dark');})()">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>

  <script src="email.js"></script>
  <script>
    var B = Email.B;
    var ws = { type: 'ws', initial: '4', color: '#2563eb', name: '4MMP', slug: '4mmp' };

    Email.renderAll('#emails', [
      {
        meta: { mailer: 'Auth::Backend::WelcomeMailer#customer_welcome', from: '4MMP <noreply@eventya.net>', ctx: 'ws' },
        header: ws, category: 'Bun venit', ref: 'AUTH-002',
        body: B.icon('🚀')
            + B.h1('Bine ai venit, Andrei!')
            + B.lead('Workspace-ul tău e gata. Ți-am pregătit un șablon de pornire cu conținut demo — fă-l al tău în trei pași simpli.')
            + B.steps([
                { t: 'Alege-ți culorile', d: 'Pune culorile brandului tău și tot site-ul se schimbă pe loc.' },
                { t: 'Schimbă textele demo', d: 'Înlocuiește conținutul generat cu al tău: povestea ta, serviciile tale, pozele tale.' },
                { t: 'Dă-i drumul pe domeniul tău', d: 'Conectează domeniul propriu și publică — certificat SSL inclus, zero configurări.' }
              ])
            + B.btn('Intră în workspace →')
            + B.callout('info', B.strong('Vezi-l ca aplicație.') + ' Descarcă Eventya Sandbox pe telefon și răsfoiește workspace-ul ca app de iOS sau Android, înainte de lansare.')
      },
      {
        meta: { mailer: 'Auth::Backend::WelcomeMailer#editor_welcome', from: '4MMP <noreply@eventya.net>', ctx: 'ws' },
        header: ws, category: 'Bun venit', ref: 'AUTH-004',
        body: B.h1('Bun venit în echipă!')
            + B.p('Salut, Maria! Ai acum acces de editor la ' + B.strong('4MMP') + '. Poți începe să lucrezi la conținut chiar acum.')
            + B.btn('Deschide panoul →')
      },
      {
        meta: { mailer: 'Auth::Member::WelcomeMailer#welcome', from: '4MMP <noreply@eventya.net>', ctx: 'ws' },
        header: ws, category: 'Bun venit', ref: 'AUTH-003',
        body: B.icon('✨')
            + B.h1('Bine ai venit pe 4MMP!')
            + B.lead('Salut, Ion! Mersi că ești alături de noi. Iată ce poți face de acum:')
            + B.steps([
                { t: 'Salvează pagini', d: 'Pune la favorite paginile care-ți plac și revii la ele oricând.' },
                { t: 'Liste & recenzii', d: 'Organizează conținutul în liste personale și spune-ți părerea.' },
                { t: 'Primești notificări', d: 'Ești mereu la curent cu ultimele noutăți.' }
              ])
            + B.btn('Intră pe 4MMP →')
            + B.small('Primești acest mesaj pentru că te-ai înscris pe 4mmp.')
      },
      {
        meta: { mailer: 'Auth::Member::WelcomeMailer#welcome (fără workspace)', from: 'Eventya <noreply@eventya.net>', ctx: 'pf' },
        header: { type: 'pf' }, category: 'Bun venit', ref: 'AUTH-003',
        body: B.icon('🎉')
            + B.h1('Bine ai venit pe Eventya!')
            + B.lead('Salut, Ion! Ne bucurăm că ești aici. Hai să-ți faci primii pași:')
            + B.steps([
                { t: 'Explorează panoul', d: 'Descoperă tot ce poți face cu contul tău.' },
                { t: 'Completează-ți profilul', d: 'Câteva detalii și contul devine al tău.' }
              ])
            + B.btn('Începe →')
      }
    ]);
  </script>
</body>
</html>
