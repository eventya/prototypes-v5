<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schimbă politica de SLA · Ticket #HD-1042</title>
  <script>
    (function () {
      var t = localStorage.getItem('proto-theme');
      if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <link rel="stylesheet" href="../../assets/application.css">
  <style>
    :root { --text-xs:0.8125rem; --text-sm:0.9375rem; --text-base:1.0625rem; --text-lg:1.1875rem; --text-xl:1.375rem; }
  </style>
</head>
<body class="bg-surface-50 text-ink-800 font-sans antialiased min-h-dvh">

  <!-- ── Navbar (consistent cu pagina de detaliu ticket) ── -->
  <header class="flex items-center h-14 gap-4 px-4 bg-surface-0 border-b border-surface-200 relative z-50">
    <div class="flex items-center justify-between w-full mx-auto max-w-7xl">
      <div class="flex items-center gap-3">
        <div class="hidden md:flex w-7 h-7 rounded-lg bg-linear-to-br from-primary-600 to-primary-400 items-center justify-center text-white text-xs font-bold shadow-sm">E</div>
        <div class="hidden md:block w-px h-6 bg-surface-200"></div>
        <div class="flex items-center gap-2.5">
          <div class="w-7 h-7 rounded-lg bg-linear-to-br from-primary-600 to-primary-400 flex items-center justify-center text-white text-[10px] font-bold shadow-sm">PE</div>
          <span class="text-sm font-semibold text-ink-900 max-w-32 truncate">Primăria Exemplu</span>
        </div>
      </div>
      <nav class="hidden md:flex items-center gap-2">
        <a href="#" class="inline-flex items-center gap-2 px-5 py-2.5 bg-surface-0 border border-surface-200 text-ink-700 rounded-full text-sm font-medium hover:border-surface-400 transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
          Acasă
        </a>
        <a href="#" class="inline-flex items-center gap-2 px-5 py-2.5 bg-surface-0 border border-surface-200 text-ink-700 rounded-full text-sm font-medium hover:border-surface-400 transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
          Pagini
        </a>
        <a href="#" class="inline-flex items-center gap-2 px-5 py-2.5 bg-gray-900 dark:bg-white text-white dark:text-gray-900 rounded-full text-sm font-medium transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Helpdesk
        </a>
        <a href="#" class="inline-flex items-center gap-2 px-5 py-2.5 bg-surface-0 border border-surface-200 text-ink-700 rounded-full text-sm font-medium hover:border-surface-400 transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Contacte
        </a>
      </nav>
      <div class="flex items-center gap-2.5">
        <button type="button" class="w-9 h-9 rounded-lg flex items-center justify-center text-ink-500 hover:bg-surface-100 transition-colors" aria-label="Asistent AI">
          <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9z"/></svg>
        </button>
        <button type="button" class="w-9 h-9 rounded-lg flex items-center justify-center text-ink-500 hover:bg-surface-100 transition-colors relative" aria-label="Notificări">
          <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="absolute top-1.5 right-1.5 w-1.5 h-1.5 rounded-full bg-red-500"></span>
        </button>
        <div class="hidden md:block w-px h-5 bg-surface-200"></div>
        <button type="button" class="w-8 h-8 rounded-full bg-blue-100 dark:bg-blue-500/20 text-blue-700 dark:text-blue-300 text-[11px] font-bold flex items-center justify-center" aria-label="Cont">AI</button>
      </div>
    </div>
  </header>

  <div class="max-w-2xl mx-auto px-4 py-7 md:px-8 md:py-10">

    <a href="01-ticket-show.html" class="inline-flex items-center gap-1.5 text-sm font-medium text-ink-400 hover:text-ink-700 transition-colors mb-5">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      Înapoi la Ticket #HD-1042
    </a>

    <div class="flex items-center gap-3 mb-7">
      <div class="w-11 h-11 rounded-xl bg-blue-50 dark:bg-blue-500/10 flex items-center justify-center shrink-0">
        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M12 8v4l2 1"/></svg>
      </div>
      <div>
        <div class="text-xl font-bold text-ink-900">Schimbă politica de SLA</div>
        <div class="text-sm text-ink-400">Politica de răspuns aplicată tichetului #HD-1042</div>
      </div>
    </div>

    <!-- Selector politici (radio cards) -->
    <form class="space-y-3" data-sla-form>
      <label class="ro flex items-start gap-3 p-4 rounded-xl border border-surface-200 bg-surface-0 cursor-pointer transition-colors has-checked:border-primary has-checked:bg-primary/5">
        <input type="radio" name="sla" value="standard" checked class="mt-1 accent-primary w-4 h-4">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <span class="text-base font-semibold text-ink-900">Standard Business</span>
            <span class="inline-flex items-center px-2 py-0.5 rounded-full text-[11px] font-semibold bg-primary/10 text-primary">curentă</span>
          </div>
          <div class="text-sm text-ink-500 mt-0.5">Program de lucru L–V, 09:00–18:00.</div>
          <div class="flex flex-wrap gap-4 mt-2.5 text-xs text-ink-600">
            <span>Primul răspuns: <span class="font-semibold text-ink-800">1h</span></span>
            <span>Rezolvare: <span class="font-semibold text-ink-800">30 zile</span></span>
          </div>
        </div>
      </label>

      <label class="ro flex items-start gap-3 p-4 rounded-xl border border-surface-200 bg-surface-0 cursor-pointer transition-colors has-checked:border-primary has-checked:bg-primary/5">
        <input type="radio" name="sla" value="premium" class="mt-1 accent-primary w-4 h-4">
        <div class="flex-1 min-w-0">
          <div class="text-base font-semibold text-ink-900">Premium 24/7</div>
          <div class="text-sm text-ink-500 mt-0.5">Acoperire non-stop, inclusiv weekend și sărbători.</div>
          <div class="flex flex-wrap gap-4 mt-2.5 text-xs text-ink-600">
            <span>Primul răspuns: <span class="font-semibold text-ink-800">15m</span></span>
            <span>Rezolvare: <span class="font-semibold text-ink-800">3 zile</span></span>
          </div>
        </div>
      </label>

      <label class="ro flex items-start gap-3 p-4 rounded-xl border border-surface-200 bg-surface-0 cursor-pointer transition-colors has-checked:border-primary has-checked:bg-primary/5">
        <input type="radio" name="sla" value="internal" class="mt-1 accent-primary w-4 h-4">
        <div class="flex-1 min-w-0">
          <div class="text-base font-semibold text-ink-900">Intern — best effort</div>
          <div class="text-sm text-ink-500 mt-0.5">Fără termene garantate; folosit pentru tichete interne.</div>
          <div class="flex flex-wrap gap-4 mt-2.5 text-xs text-ink-600">
            <span>Primul răspuns: <span class="font-semibold text-ink-800">—</span></span>
            <span>Rezolvare: <span class="font-semibold text-ink-800">—</span></span>
          </div>
        </div>
      </label>
    </form>

    <!-- Preview impact -->
    <div class="mt-5 rounded-xl border border-amber-200 dark:border-amber-500/25 bg-amber-50 dark:bg-amber-500/10 px-4 py-3 flex items-start gap-2.5">
      <svg class="w-4 h-4 shrink-0 mt-0.5 text-amber-600 dark:text-amber-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
      <span class="text-sm leading-snug text-amber-800 dark:text-amber-200">Schimbarea politicii recalculează termenele active. Termenele deja depășite nu se modifică retroactiv.</span>
    </div>

    <!-- Acțiuni -->
    <div class="flex items-center gap-3 mt-6">
      <button type="submit" form="" class="btn btn--primary">Salvează politica</button>
      <a href="01-ticket-show.html" class="btn btn--ghost">Anulează</a>
    </div>
  </div>

  <button type="button" class="btn fixed bottom-4 right-4 shadow-lg"
    onclick="(function(){var d=document.documentElement;var on=d.getAttribute('data-theme')==='dark';d.setAttribute('data-theme',on?'':'dark');localStorage.setItem('proto-theme',on?'light':'dark');})()">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>

</html>
