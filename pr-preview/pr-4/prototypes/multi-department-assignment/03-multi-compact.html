<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Varianta B — Flux compact · Atribuire</title>
  <script>
    (function () {
      var t = localStorage.getItem('proto-theme');
      if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <link rel="stylesheet" href="../../assets/application.css">
</head>
<body class="bg-surface-50 text-ink-800 font-sans antialiased min-h-screen">

  <div class="max-w-2xl mx-auto px-4 py-6 md:py-10">

    <div class="rounded-xl border border-amber-200 dark:border-amber-500/20 bg-amber-50/60 dark:bg-amber-500/5 px-4 py-2.5 mb-6 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span>
        <span class="text-[11px] font-semibold text-amber-700 dark:text-amber-300">Varianta B · Flux compact (fără carduri)</span>
      </div>
      <a href="index.html" class="text-[11px] font-medium text-amber-700 dark:text-amber-300 hover:underline">← înapoi la set</a>
    </div>

    <p class="text-[13px] text-ink-500 mb-5">Același flux pe departamente, dar mai dens — rânduri despărțite de o linie, fără chenare. <strong class="text-ink-700">Click pe departament, pe „Adaugă agent", pe ×.</strong></p>

    <div class="w-80 mx-auto bg-surface-0 rounded-xl border border-surface-200">
      <div class="px-5 pt-5 pb-5">
        <h3 class="text-[11px] font-bold uppercase tracking-wider text-ink-400 mb-3">Atribuire</h3>

        <div id="blocks"></div>

        <button type="button" class="adddept" onclick="event.stopPropagation(); addBlock()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13"><path d="M12 5v14M5 12h14"/></svg>
          Adaugă alt departament
        </button>

        <div class="rounded-lg border border-surface-200 bg-surface-50 p-3 mt-4">
          <div class="flex items-start gap-2">
            <svg class="w-3.5 h-3.5 text-ink-400 mt-0.5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <div>
              <div class="text-[11px] font-semibold uppercase tracking-wider text-ink-400">Vor fi notificați</div>
              <div id="notify" class="text-[12px] text-ink-700 mt-0.5 leading-relaxed"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <style>
    /* compact: no card, just a divider between departments */
    .block{padding:.6rem 0;border-bottom:1px solid var(--color-surface-200)}
    .block:first-child{padding-top:0}
    #blocks .block:last-child{border-bottom:none}
    .deptbtn{display:inline-flex;align-items:center;gap:.4rem;font-size:13px;font-weight:600;color:var(--color-ink-800);padding:.2rem .35rem;border-radius:.4rem;cursor:pointer}
    .deptbtn:hover{background:var(--color-surface-50)}
    .deptbtn .ic{width:.9rem;height:.9rem;color:var(--color-ink-400);flex:none}
    .deptbtn .chev{width:.85rem;height:.85rem;color:var(--color-ink-300);flex:none}
    .deptbtn.empty{color:var(--color-ink-400);font-weight:500}
    .rmblock{display:inline-flex;color:var(--color-ink-300);padding:.2rem;border-radius:.35rem;cursor:pointer}
    .rmblock:hover{color:var(--color-ink-600);background:var(--color-surface-100)}
    .addagent{display:inline-flex;align-items:center;gap:.25rem;font-size:12px;font-weight:500;color:var(--color-ink-500);padding:.2rem .4rem;border-radius:.4rem;cursor:pointer}
    .addagent:hover{color:var(--color-ink-800);background:var(--color-surface-100)}
    .adddept{width:100%;display:flex;align-items:center;justify-content:center;gap:.4rem;border:1px dashed var(--color-surface-300);border-radius:.6rem;padding:.55rem;font-size:12px;font-weight:600;color:var(--color-ink-500);cursor:pointer;transition:all .12s;margin-top:.5rem}
    .adddept:hover{border-color:var(--color-ink-300);color:var(--color-ink-700);background:var(--color-surface-50)}
    .ddmenu{position:absolute;left:0;top:100%;margin-top:.3rem;z-index:30;min-width:12.5rem;background:var(--color-surface-0);border:1px solid var(--color-surface-200);border-radius:.6rem;box-shadow:0 12px 28px -8px rgb(0 0 0/.22);padding:.3rem;max-height:14rem;overflow-y:auto}
    .optrow{width:100%;display:flex;align-items:center;gap:.5rem;padding:.4rem .45rem;border-radius:.45rem;text-align:left;transition:background .12s;cursor:pointer}
    .optrow:hover{background:var(--color-surface-50)}
    .optrow[disabled]{opacity:.4;cursor:not-allowed}
    .optname{font-size:13px;font-weight:500;color:var(--color-ink-800);flex:1;min-width:0}
    .optmeta{font-size:11px;color:var(--color-ink-400)}
    .ini{width:1.2rem;height:1.2rem;border-radius:9999px;background:var(--color-surface-200);color:var(--color-ink-600);font-size:9px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex:none}
    .tick{width:.95rem;height:.95rem;color:var(--color-primary);flex:none}
  </style>

  <script>
    const DEPTS = {
      facturare:{name:'Facturare', agents:['maria','dan']},
      suport:{name:'Suport Tehnic', agents:['andrei','sorin']},
      salubrizare:{name:'Salubrizare', agents:['ioana','radu']},
      politia:{name:'Poliția Locală', agents:['vlad','cristina']},
      urbanism:{name:'Urbanism', agents:['elena']}
    };
    const AGENTS = { maria:'Maria Ionescu', dan:'Dan Marin', andrei:'Andrei Popescu', sorin:'Sorin Ene',
      ioana:'Ioana Marin', radu:'Radu Stan', vlad:'Vlad Georgescu', cristina:'Cristina Pop', elena:'Elena Dumitrescu' };

    let blocks = [ {dept:'salubrizare', agents:['ioana','radu']}, {dept:'politia', agents:['vlad']} ];
    let openMenu = null;

    const FOLDER = '<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>';
    const CHEV = '<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>';
    const X = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="11" height="11"><path d="M18 6L6 18M6 6l12 12"/></svg>';
    const XB = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M18 6L6 18M6 6l12 12"/></svg>';
    const PLUS = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="11" height="11"><path d="M12 5v14M5 12h14"/></svg>';
    const TICK = '<svg class="tick" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>';
    const initials = n => n.split(' ').map(w=>w[0]).slice(0,2).join('');
    const usedDepts = exceptI => new Set(blocks.filter((b,idx)=>idx!==exceptI && b.dept).map(b=>b.dept));

    function deptMenu(i){
      const used = usedDepts(i);
      const rows = Object.entries(DEPTS).map(([id,d])=>{
        const sel = blocks[i].dept===id, dis = used.has(id) && !sel;
        return `<button type="button" class="optrow" ${dis?'disabled':`onclick="event.stopPropagation();pickDept(${i},'${id}')"`}>
          <span class="optname">${d.name}</span><span class="optmeta">${d.agents.length} ag.</span>${sel?TICK:''}</button>`;
      }).join('');
      return `<div class="ddmenu">${rows}</div>`;
    }
    function agentMenu(i){
      const rem = DEPTS[blocks[i].dept].agents.filter(a=>!blocks[i].agents.includes(a));
      if(!rem.length) return `<div class="ddmenu"><div class="optrow" style="cursor:default;color:var(--color-ink-400);font-size:12px">Toți agenții sunt adăugați</div></div>`;
      return `<div class="ddmenu">${rem.map(a=>`<button type="button" class="optrow" onclick="event.stopPropagation();addAgent(${i},'${a}')"><span class="ini">${initials(AGENTS[a])}</span><span class="optname">${AGENTS[a]}</span></button>`).join('')}</div>`;
    }

    function blockHtml(b,i){
      const dm = (openMenu&&openMenu.i===i&&openMenu.type==='dept') ? deptMenu(i) : '';
      const deptBtn = `<button type="button" class="deptbtn ${b.dept?'':'empty'}" onclick="event.stopPropagation();toggleMenu(${i},'dept')">${FOLDER}<span class="truncate">${b.dept?DEPTS[b.dept].name:'Alege departament'}</span>${CHEV}</button>`;
      let addBtn = '';
      if(b.dept){
        const am = (openMenu&&openMenu.i===i&&openMenu.type==='agent') ? agentMenu(i) : '';
        addBtn = `<div class="relative inline-flex shrink-0"><button type="button" class="addagent" onclick="event.stopPropagation();toggleMenu(${i},'agent')">${PLUS}Adaugă agent</button>${am}</div>`;
      }
      const chips = (b.dept && b.agents.length)
        ? `<div class="mt-1.5 pl-1 flex flex-wrap items-center gap-1.5">${b.agents.map(a=>`<span class="badge"><span class="ini">${initials(AGENTS[a])}</span>${AGENTS[a]}<button type="button" class="badge__remove" onclick="event.stopPropagation();removeAgent(${i},'${a}')" aria-label="Elimină">${X}</button></span>`).join('')}</div>`
        : '';
      return `<div class="block">
        <div class="flex items-center gap-2">
          <div class="relative flex-1 min-w-0">${deptBtn}${dm}</div>
          ${addBtn}
          <button type="button" class="rmblock" onclick="event.stopPropagation();removeBlock(${i})" aria-label="Elimină departament">${XB}</button>
        </div>
        ${chips}</div>`;
    }

    function notify(){
      const parts = blocks.filter(b=>b.dept).map(b=> b.agents.length
        ? '<strong class="text-ink-800">'+b.agents.map(a=>AGENTS[a]).join(', ')+'</strong> ('+DEPTS[b.dept].name+')'
        : 'toți agenții din '+DEPTS[b.dept].name);
      document.getElementById('notify').innerHTML = parts.length ? parts.join('<br>') : 'Nimeni — adaugă un departament.';
    }
    function render(){ document.getElementById('blocks').innerHTML = blocks.map(blockHtml).join(''); notify(); }

    function toggleMenu(i,type){ openMenu = (openMenu&&openMenu.i===i&&openMenu.type===type) ? null : {i,type}; render(); }
    function pickDept(i,id){ blocks[i].dept=id; blocks[i].agents = blocks[i].agents.filter(a=>DEPTS[id].agents.includes(a)); openMenu=null; render(); }
    function addAgent(i,id){ if(!blocks[i].agents.includes(id)) blocks[i].agents.push(id); openMenu=null; render(); }
    function removeAgent(i,id){ blocks[i].agents = blocks[i].agents.filter(a=>a!==id); render(); }
    function removeBlock(i){ blocks.splice(i,1); openMenu=null; render(); }
    function addBlock(){ blocks.push({dept:null,agents:[]}); openMenu={i:blocks.length-1,type:'dept'}; render(); }
    document.addEventListener('click', ()=>{ if(openMenu){ openMenu=null; render(); } });

    render();
  </script>

  <button type="button" class="btn fixed bottom-4 right-4 shadow-lg z-50" onclick="(function(){var d=document.documentElement;var on=d.getAttribute('data-theme')==='dark';d.setAttribute('data-theme',on?'':'dark');localStorage.setItem('proto-theme',on?'light':'dark');})()"><svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
</body>
</html>
