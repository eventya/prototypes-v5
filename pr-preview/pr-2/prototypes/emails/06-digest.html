<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digest · Email-uri</title>
  <script>
    (function () {
      var t = localStorage.getItem('proto-theme');
      if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <link rel="stylesheet" href="../../assets/application.css">
  <link rel="stylesheet" href="email.css">
</head>
<body class="bg-surface-50 text-ink-800 font-sans antialiased min-h-screen">

  <div class="rounded-xl border border-amber-200 dark:border-amber-500/20 bg-amber-50/60 dark:bg-amber-500/5 px-4 py-2.5 m-4 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span>
      <span class="text-[11px] font-semibold text-amber-700 dark:text-amber-300">Email-uri · 06 — Digest</span>
    </div>
    <a href="index.html" class="text-[11px] font-medium text-amber-700 dark:text-amber-300 hover:underline">← înapoi la set</a>
  </div>

  <div class="max-w-2xl mx-auto px-4 py-6 md:px-6 md:py-8">
    <div class="card p-6 mb-10">
      <div class="text-xl font-bold text-ink-900">Digest de activitate</div>
      <div class="text-sm text-ink-500 mt-1.5 leading-relaxed">
        Sumar periodic pentru echipă. Zilnic, săptămânal și lunar folosesc același layout — diferă doar perioada și volumul de date. Mai jos: săptămânal (bogat) și zilnic (ușor).
      </div>
    </div>
    <div id="emails" class="space-y-12"></div>
  </div>

  <button type="button" class="btn fixed bottom-4 right-4 shadow-lg z-50"
    onclick="(function(){var d=document.documentElement;var on=d.getAttribute('data-theme')==='dark';d.setAttribute('data-theme',on?'':'dark');localStorage.setItem('proto-theme',on?'light':'dark');})()">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>

  <script src="email.js"></script>
  <script>
    var B = Email.B;
    var ws = { type: 'ws', initial: '4', color: '#2563eb', name: '4MMP', slug: '4mmp' };

    Email.renderAll('#emails', [
      {
        meta: { mailer: 'DigestMailer#weekly_summary', from: '4MMP <noreply@eventya.net>', ctx: 'ws' },
        header: ws, category: 'Digest săptămânal', ref: 'DIGEST-002',
        body: B.h1('Ce s-a întâmplat săptămâna asta pe 4MMP')
            + B.lead('Pe scurt, activitatea din 9–15 iunie 2026.')
            + B.sectionHead('Trafic')
            + B.stats([{ n: '1.247', l: 'Vizualizări' }, { n: '893', l: 'Vizitatori' }, { n: '+12%', l: 'vs. săpt. trecută' }])
            + B.sectionHead('Conținut')
            + B.panel([['Pagini noi', '3'], ['Pagini modificate', '4'], ['Membri noi', '12']])
            + B.sectionHead('Helpdesk')
            + B.panel([['Tickete noi', '7'], ['Tickete deschise', '5']])
            + B.callout('warn', B.strong('Stocarea media e la 84%.') + ' Curăță fișierele nefolosite când ai un moment.')
            + B.btn('Deschide panoul →')
            + B.small('Primești digestul săptămânal. Schimbi frecvența oricând din preferințele de notificare.')
      },
      {
        meta: { mailer: 'DigestMailer#daily_summary', from: '4MMP <noreply@eventya.net>', ctx: 'ws' },
        header: ws, category: 'Digest zilnic', ref: 'DIGEST-001',
        body: B.h1('Activitatea de ieri pe 4MMP')
            + B.lead('14 iunie 2026')
            + B.stats([{ n: '182', l: 'Vizualizări' }, { n: '1', l: 'Pagină nouă' }, { n: '2', l: 'Tickete noi' }])
            + B.p('Trei pagini stau de peste 30 de zile în draft. Publică-le sau șterge-le când ai chef.')
            + B.btn('Deschide panoul →')
            + B.small('Primești digestul zilnic. Schimbi frecvența oricând din preferințele de notificare.')
      }
    ]);
  </script>
</body>
</html>
